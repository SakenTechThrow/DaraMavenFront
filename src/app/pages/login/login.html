<div class="auth-page page-bg">
  <mat-card class="auth-card app-card">
    <h1 class="page-title">{{ 'auth.loginTitle' | t }}</h1>
    <p class="auth-subtitle">{{ 'auth.loginSubtitle' | t }}</p>

    <form (ngSubmit)="onSubmit()" class="auth-form">
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>{{ 'common.email' | t }}</mat-label>
        <input
          matInput
          type="email"
          name="email"
          [(ngModel)]="email"
          placeholder="Enter email"
          required
        />
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>{{ 'common.password' | t }}</mat-label>
        <input
          matInput
          type="password"
          name="password"
          [(ngModel)]="password"
          placeholder="Enter password"
          required
        />
      </mat-form-field>

      @if (errorMessage) {
        <p class="error">{{ errorMessage }}</p>
      }

      <button
        mat-raised-button
        class="full-width primary-gradient-btn auth-submit-btn"
        type="submit"
        [disabled]="loading"
      >
        {{ loading ? ('common.loading' | t) : ('auth.loginButton' | t) }}
      </button>
    </form>

    <p class="link-text">
      {{ 'auth.dontHaveAccount' | t }}
      <a routerLink="/register">Register</a>
    </p>
  </mat-card>
</div>
